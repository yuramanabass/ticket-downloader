<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNMA Ferries | Download My Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .booking-card {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .brand-header {
            background-color: #0a2540;
            color: white;
            border-radius: 1.5rem 1.5rem 0 0;
            padding: 2rem;
            text-align: center;
        }
        .btn-generate {
            background-color: #00d4ff;
            border: none;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn-generate:hover {
            background-color: #00b8e6;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container p-3">
    <div class="card booking-card mx-auto">
        <div class="brand-header">
            <div class="bg-info rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 50px; height: 50px;">
                <i class="bi bi-ticket-perforated text-white fs-3"></i>
            </div>
            <h4 class="fw-bold mb-0">MNMA FERRIES</h4>
            <p class="small opacity-75 mb-0 text-uppercase tracking-wider">Passenger Ticket Portal</p>
        </div>

        <div class="card-body p-4">
            <p class="text-center text-muted small mb-4">Please verify your details to download your digital boarding pass.</p>
            
            <form id="publicDownloadForm">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">REGISTERED NAME</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-primary"></i></span>
                        <input type="text" id="userName" class="form-control border-start-0 ps-0" placeholder="Exactly as booked" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">ASSIGNED SEAT NUMBER</label>
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0"><i class="bi bi-armchair text-primary"></i></span>
                        <input type="number" id="userSeat" class="form-control border-start-0 ps-0" placeholder="e.g. 45" required>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="btn btn-primary w-100 py-3 rounded-3 shadow btn-generate">
                    <i class="bi bi-download me-2"></i>VERIFY & DOWNLOAD QR
                </button>
            </form>
        </div>
        
        <div class="card-footer bg-white border-0 text-center pb-4">
            <small class="text-muted">Safe travels with MNMA Ferries &copy; 2026</small>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1060;"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="download.js"></script>
</body>
</html>
